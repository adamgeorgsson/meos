name: C++ CI

on:
  push:
    branches:
      - base
      - migration-*
      - web-frontend-*
  pull_request:
    branches:
      - base
      - migration-*
      - web-frontend-*

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg-binary-cache,readwrite'

    steps:
      - uses: actions/checkout@v6

      - name: Cache vcpkg binary packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/vcpkg-binary-cache
          key: vcpkg-binary-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-binary-${{ runner.os }}-

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'
          vcpkgGitCommitId: '67f167b2f7c170f83688919c90edcd896239330e'

      - name: Configure
        run: cmake --preset default ${{ runner.os == 'Linux' && '-DMEOS_ENABLE_CLANG_TIDY=ON' || '' }}

      - name: Build
        run: cmake --build --preset default

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: meos-${{ runner.os }}
          path: |
            build/meos
            build/meos.exe
          if-no-files-found: warn
