name: Frontend CI

on:
  push:
    branches:
      - base
      - migration-*
      - web-frontend-*
  pull_request:
    branches:
      - base
      - migration-*
      - web-frontend-*

defaults:
  run:
    working-directory: src/ui/web

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          cache-dependency-path: src/ui/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
