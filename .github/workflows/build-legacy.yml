name: Build legacy MeOS

on:
  push:
    branches: [base, 'legacy-preparation-*', 'legacy-build-*']
    paths:
      - 'code/**'
      - '.github/workflows/build-legacy.yml'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    steps:
      - uses: actions/checkout@v6

      - name: Install OpenSSL 1.1
        run: choco install openssl --version=1.1.1.2100 -y --no-progress

      - name: Configure (CMake)
        run: >
          cmake -S code -B code/build -A x64
          -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL-Win64"
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build code/build --config ${{ matrix.configuration }} --parallel

      - name: Package release
        shell: pwsh
        run: |
          $outDir = "code/build/${{ matrix.configuration }}"

          Copy-Item code/dll64/libharu.dll  $outDir
          Copy-Item code/dll64/libmysql.dll $outDir

          # vcpkg-provided DLLs (zlib; minizip may be static depending on triplet)
          $vcpkgBin = "code/build/vcpkg_installed/x64-windows/bin"
          if (Test-Path "$vcpkgBin/zlib1.dll") { Copy-Item "$vcpkgBin/zlib1.dll" $outDir }

          $opensslDir = (Get-ChildItem "C:\Program Files\OpenSSL*" -Directory | Select-Object -First 1).FullName
          Copy-Item "$opensslDir\libssl-1_1-x64.dll"    $outDir
          Copy-Item "$opensslDir\libcrypto-1_1-x64.dll"  $outDir

          $vcToolsDir = (& vswhere -latest -find "VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT") | Select-Object -Last 1
          Copy-Item "$vcToolsDir\MSVCP140.dll"        $outDir
          Copy-Item "$vcToolsDir\VCRUNTIME140.dll"    $outDir
          Copy-Item "$vcToolsDir\VCRUNTIME140_1.dll"  $outDir

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: MeOS-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            code/build/${{ matrix.configuration }}/MeOS.exe
            code/build/${{ matrix.configuration }}/libharu.dll
            code/build/${{ matrix.configuration }}/libmysql.dll
            code/build/${{ matrix.configuration }}/libssl-1_1-x64.dll
            code/build/${{ matrix.configuration }}/libcrypto-1_1-x64.dll
            code/build/${{ matrix.configuration }}/MSVCP140.dll
            code/build/${{ matrix.configuration }}/VCRUNTIME140.dll
            code/build/${{ matrix.configuration }}/VCRUNTIME140_1.dll
          if-no-files-found: warn
