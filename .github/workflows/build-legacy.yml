name: Build legacy MeOS

on:
  push:
    branches: [base, 'legacy-preparation-*', 'legacy-build-*']
    paths:
      - 'code/**'
      - '.github/workflows/build-legacy.yml'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL 1.1
        run: choco install openssl --version=1.1.1.2100 -y --no-progress

      - name: Configure
        run: cmake -S code -B code/build -A x64 -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build code/build --config ${{ matrix.configuration }}

      - name: Package release
        shell: pwsh
        run: |
          $outDir = "code/build/${{ matrix.configuration }}"

          Copy-Item code/dll64/libharu.dll  $outDir
          Copy-Item code/dll64/libmysql.dll $outDir

          $vcpkgBin = "code/build/vcpkg_installed/x64-windows/bin"
          Get-ChildItem "$vcpkgBin/zlib*.dll"    | Copy-Item -Destination $outDir
          Get-ChildItem "$vcpkgBin/minizip*.dll" | Copy-Item -Destination $outDir
          Get-ChildItem "$vcpkgBin/libpng*.dll"  | Copy-Item -Destination $outDir

          $opensslDir = (Get-ChildItem "C:\Program Files\OpenSSL*" -Directory | Select-Object -First 1).FullName
          Copy-Item "$opensslDir\libssl-1_1-x64.dll"    $outDir
          Copy-Item "$opensslDir\libcrypto-1_1-x64.dll" $outDir

          $vcToolsDir = (& vswhere -latest -find "VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT") | Select-Object -Last 1
          Copy-Item "$vcToolsDir\MSVCP140.dll"       $outDir
          Copy-Item "$vcToolsDir\VCRUNTIME140.dll"   $outDir
          Copy-Item "$vcToolsDir\VCRUNTIME140_1.dll" $outDir

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeOS-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            code/build/${{ matrix.configuration }}/MeOS.exe
            code/build/${{ matrix.configuration }}/*.dll
            code/build/${{ matrix.configuration }}/*.xml
            code/build/${{ matrix.configuration }}/*.csv
            code/build/${{ matrix.configuration }}/*.listdef
            code/build/${{ matrix.configuration }}/*.lxml
            code/build/${{ matrix.configuration }}/*.template
            code/build/${{ matrix.configuration }}/*.meos
            code/build/${{ matrix.configuration }}/*.mwd
            code/build/${{ matrix.configuration }}/*.wpersons
            code/build/${{ matrix.configuration }}/*.brules
            code/build/${{ matrix.configuration }}/*.cardsystem
          if-no-files-found: warn
