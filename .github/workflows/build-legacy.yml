name: Build legacy MeOS

on:
  push:
    branches: [base, 'legacy-preparation-*']
    paths:
      - 'code/**'
      - '.github/workflows/build-legacy.yml'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    steps:
      - uses: actions/checkout@v6

      - name: Install OpenSSL 1.1
        run: choco install openssl --version=1.1.1.2100 -y --no-progress

      - name: Configure
        run: cmake -S code -B code/build -A x64

      - name: Build
        run: cmake --build code/build --config ${{ matrix.configuration }}

      - name: Package release
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path code/build -Recurse -Filter MeOS.exe | Select-Object -First 1
          $outDir = $exe.DirectoryName

          Copy-Item code/dll64/libharu.dll  $outDir
          Copy-Item code/dll64/libmysql.dll $outDir

          $opensslDir = (Get-ChildItem "C:\Program Files\OpenSSL*" -Directory | Select-Object -First 1).FullName
          Copy-Item "$opensslDir\libssl-1_1-x64.dll"    $outDir
          Copy-Item "$opensslDir\libcrypto-1_1-x64.dll"  $outDir

          $vcToolsDir = (& vswhere -latest -find "VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT") | Select-Object -Last 1
          Copy-Item "$vcToolsDir\MSVCP140.dll"        $outDir
          Copy-Item "$vcToolsDir\VCRUNTIME140.dll"    $outDir
          Copy-Item "$vcToolsDir\VCRUNTIME140_1.dll"  $outDir

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: MeOS-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            code/build/**/MeOS.exe
            code/build/**/libharu.dll
            code/build/**/libmysql.dll
            code/build/**/libssl-1_1-x64.dll
            code/build/**/libcrypto-1_1-x64.dll
            code/build/**/MSVCP140.dll
            code/build/**/VCRUNTIME140.dll
            code/build/**/VCRUNTIME140_1.dll
          if-no-files-found: warn
