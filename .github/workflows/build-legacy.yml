name: Build legacy MeOS

on:
  push:
    branches: [base, 'legacy-preparation-*']

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    env:
      VCPKG_DEFAULT_BINARY_CACHE: C:\vcpkg-cache

    steps:
      - uses: actions/checkout@v6

      - name: Create vcpkg binary cache directory
        run: mkdir C:\vcpkg-cache

      - name: Update vcpkg
        shell: pwsh
        run: git -C "$env:VCPKG_INSTALLATION_ROOT" pull

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Configure
        shell: pwsh
        run: >
          cmake -S code -B code/build -A x64
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          "-DVCPKG_MANIFEST_DIR=${{ github.workspace }}"

      - name: Build
        run: cmake --build code/build --config ${{ matrix.configuration }}

      - name: Package release
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path code/build -Recurse -Filter MeOS.exe | Select-Object -First 1
          $outDir = $exe.DirectoryName

          # Copy libharu DLL from vcpkg installed directory (may be libharu.dll or libhpdf.dll)
          # In manifest mode vcpkg installs next to vcpkg.json, not in the global VCPKG_INSTALLATION_ROOT
          $vcpkgBin = "$env:GITHUB_WORKSPACE\vcpkg_installed\x64-windows\bin"
          foreach ($pattern in @('libharu.dll', 'libhpdf.dll')) {
            $dll = Join-Path $vcpkgBin $pattern
            if (Test-Path $dll) { Copy-Item $dll $outDir }
          }

          # Copy MySQL DLL from vcpkg installed directory
          $mysqlDll = Join-Path $vcpkgBin 'libmysql.dll'
          if (Test-Path $mysqlDll) { Copy-Item $mysqlDll $outDir }

          # Copy OpenSSL DLLs from vcpkg installed directory (OpenSSL 3.x: libssl-3-x64.dll / libcrypto-3-x64.dll)
          if (Test-Path $vcpkgBin) {
            foreach ($pattern in @('libssl*.dll', 'libcrypto*.dll')) {
              Get-ChildItem -Path $vcpkgBin -Filter $pattern | ForEach-Object { Copy-Item $_.FullName $outDir }
            }
          }

          # Copy restbed DLL from vcpkg installed directory
          if (Test-Path $vcpkgBin) {
            $dll = Join-Path $vcpkgBin 'restbed.dll'
            if (Test-Path $dll) { Copy-Item $dll $outDir }
          }

          $vcToolsDir = (& vswhere -latest -find "VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT") | Select-Object -Last 1
          Copy-Item "$vcToolsDir\MSVCP140.dll"        $outDir
          Copy-Item "$vcToolsDir\VCRUNTIME140.dll"    $outDir
          Copy-Item "$vcToolsDir\VCRUNTIME140_1.dll"  $outDir

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: MeOS-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            code/build/**/MeOS.exe
            code/build/**/libharu.dll
            code/build/**/libhpdf.dll
            code/build/**/libmysql.dll
            code/build/**/libssl*.dll
            code/build/**/libcrypto*.dll
            code/build/**/restbed.dll
            code/build/**/MSVCP140.dll
            code/build/**/VCRUNTIME140.dll
            code/build/**/VCRUNTIME140_1.dll
          if-no-files-found: warn
