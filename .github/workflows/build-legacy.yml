name: Build legacy MeOS

on:
  push:
    branches: [base, 'build-infrastructure-*', 'legacy-preparation-*']
    paths:
      - 'code/**'
      - 'vcpkg.json'
      - '.github/workflows/build-legacy.yml'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    steps:
      - uses: actions/checkout@v6

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '62159a45e18f3a9ac0548628dcaf74fcb60c6ff9'

      - name: Configure CMake
        run: |
          cmake -S code -B code/build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_MANIFEST_DIR="${{ github.workspace }}"

      - name: Build
        run: cmake --build code/build --config ${{ matrix.configuration }} --parallel

      - name: Package release
        shell: pwsh
        run: |
          $outDir = "code/build/${{ matrix.configuration }}"

          Copy-Item code/dll64/libharu.dll  $outDir

          # MySQL, OpenSSL DLLs are provided by vcpkg (version-agnostic glob)
          $vcpkgBin = "${{ github.workspace }}/vcpkg_installed/x64-windows/bin"
          Get-ChildItem "$vcpkgBin" -Filter "libmysql.dll"   | Copy-Item -Destination $outDir
          Get-ChildItem "$vcpkgBin" -Filter "libssl*.dll"    | Copy-Item -Destination $outDir
          Get-ChildItem "$vcpkgBin" -Filter "libcrypto*.dll" | Copy-Item -Destination $outDir

          $vcToolsDir = (& vswhere -latest -find "VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT") | Select-Object -Last 1
          Copy-Item "$vcToolsDir\MSVCP140.dll"        $outDir
          Copy-Item "$vcToolsDir\VCRUNTIME140.dll"    $outDir
          Copy-Item "$vcToolsDir\VCRUNTIME140_1.dll"  $outDir

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: MeOS-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            code/build/${{ matrix.configuration }}/MeOS.exe
            code/build/${{ matrix.configuration }}/*.dll
          if-no-files-found: warn
