name: Build legacy MeOS

on:
  push:
    branches: [base, 'legacy-preparation-*', 'legacy-build-*']
    paths:
      - 'code/**'
      - '.github/workflows/build-legacy.yml'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    steps:
      - uses: actions/checkout@v6

      - name: Configure (CMake)
        run: >
          cmake -S code -B code/build -A x64
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build code/build --config ${{ matrix.configuration }} --parallel

      - name: Package release
        shell: pwsh
        run: |
          $outDir = "code/build/${{ matrix.configuration }}"

          # vcpkg-provided DLLs (zlib, libpng, libharu, libmysql; minizip may be static depending on triplet)
          $vcpkgBin = "code/build/vcpkg_installed/x64-windows/bin"
          if (Test-Path "$vcpkgBin/zlib1.dll") { Copy-Item "$vcpkgBin/zlib1.dll" $outDir }
          Get-ChildItem "$vcpkgBin/libpng*.dll" -ErrorAction SilentlyContinue | ForEach-Object { Copy-Item $_.FullName $outDir }
          Get-ChildItem "$vcpkgBin/libharu*.dll" -ErrorAction SilentlyContinue | ForEach-Object { Copy-Item $_.FullName $outDir }
          if (Test-Path "$vcpkgBin/libmysql.dll") { Copy-Item "$vcpkgBin/libmysql.dll" $outDir }

          # vcpkg-provided OpenSSL DLLs (name includes version, e.g. libssl-3-x64.dll or libssl-1_1-x64.dll)
          Get-ChildItem "$vcpkgBin/libssl*.dll"    -ErrorAction SilentlyContinue | ForEach-Object { Copy-Item $_.FullName $outDir }
          Get-ChildItem "$vcpkgBin/libcrypto*.dll" -ErrorAction SilentlyContinue | ForEach-Object { Copy-Item $_.FullName $outDir }

          $vcToolsDir = (& vswhere -latest -find "VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT") | Select-Object -Last 1
          Copy-Item "$vcToolsDir\MSVCP140.dll"        $outDir
          Copy-Item "$vcToolsDir\VCRUNTIME140.dll"    $outDir
          Copy-Item "$vcToolsDir\VCRUNTIME140_1.dll"  $outDir

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: MeOS-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            code/build/${{ matrix.configuration }}/MeOS.exe
            code/build/${{ matrix.configuration }}/libharu*.dll
            code/build/${{ matrix.configuration }}/libmysql.dll
            code/build/${{ matrix.configuration }}/libssl*.dll
            code/build/${{ matrix.configuration }}/libcrypto*.dll
            code/build/${{ matrix.configuration }}/MSVCP140.dll
            code/build/${{ matrix.configuration }}/VCRUNTIME140.dll
            code/build/${{ matrix.configuration }}/VCRUNTIME140_1.dll
          if-no-files-found: warn
